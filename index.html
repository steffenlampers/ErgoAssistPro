<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ErgoAssist Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;height:100%;overflow:hidden}
body{font-family:'IBM Plex Sans',sans-serif;background:#FAFAF5}
#loading{position:fixed;inset:0;background:#FAFAF5;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
#loading.hide{opacity:0;pointer-events:none}
#loading .logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#2A9D8F,#D4A853);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:white;box-shadow:0 8px 32px rgba(42,157,143,0.3);margin-bottom:20px}
#loading h1{font-family:'Source Serif 4',serif;font-size:24px;color:#1B2B34;margin-bottom:6px}
#loading p{font-size:13px;color:#7B95A8}
#loading .spinner{width:32px;height:32px;border:3px solid #E8E3D9;border-top-color:#2A9D8F;border-radius:50%;animation:spin .8s linear infinite;margin-top:24px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading">
  <div class="logo">E</div>
  <h1>ErgoAssist Pro</h1>
  <p>Lade Anwendung...</p>
  <div class="spinner"></div>
</div>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="patient-storage.js"></script>
<script src="app.js"></script>

<script>
  var root = ReactDOM.createRoot(document.getElementById('root'));
  if (window.ErgoAssistPro) {
    root.render(React.createElement(window.ErgoAssistPro));
    document.getElementById('loading').classList.add('hide');
    setTimeout(function(){ document.getElementById('loading').style.display='none'; }, 500);
  } else {
    document.querySelector('#loading p').textContent = 'Fehler beim Laden. Pruefe Browser-Konsole (F12).';
    document.querySelector('#loading .spinner').style.display = 'none';
  }
</script>
</body>
</html>
